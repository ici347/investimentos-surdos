<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tela Cheia Mobile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

.tela-cheia{
  width:100vw;
  height:100vh;
  height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.tela-cheia img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  object-fit:contain;
}

.btn-voltar{
  position:fixed;
  top:20px;
  left:20px;
  padding:12px 20px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:10px;
  color:#fff;
  font-size:15px;
  font-weight:600;
  z-index:10;
}
</style>
</head>
<body>
  <div class="tela-cheia">
    <button class="btn-voltar" onclick="voltar()">← Voltar</button>
    <img src="sua-imagem.jpg" alt="Imagem Centralizada">
  </div>

<script>
function voltar(){
  window.history.back(); // volta pra página anterior
  // ou use: window.location.href = 'menu.html'; pra ir pra um menu específico
}
</script>
</body>
</html>
