<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Extrato de Pagamento</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden}
body{
  height:100dvh;
  background:url('menu2.jpeg') center/cover fixed;
  color:#f5f5f7;
  padding:16px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0, 0, 0, 0.7);
  z-index:-1;
}
.container{width:100%;max-width:380px;position:relative;z-index:1}

.header{
  text-align:center;
  margin-bottom:24px;
}
.header h1{
  font-size:28px;
  font-weight:700;
  letter-spacing:-0.6px;
  margin-bottom:4px;
}
.header p{
  font-size:14px;
  color:rgba(235,235,245,0.6);
  letter-spacing:-0.2px;
}

.card{
  background:rgba(28, 28, 30, 0.75);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-radius:16px;
  padding:20px;
  margin-bottom:12px;
  border:0.5px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  cursor:pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.compra{
  border:0.5px solid rgba(10, 132, 255, 0.4);
}
.compra:hover{
  background:rgba(10, 132, 255, 0.15);
  transform:scale(1.02);
  border-color:rgba(10, 132, 255, 0.6);
}
.compra:active{transform:scale(0.98);}

.recebimento{
  border:0.5px solid rgba(48, 209, 88, 0.4);
}
.recebimento:hover{
  background:rgba(48, 209, 88, 0.15);
  transform:scale(1.02);
  border-color:rgba(48, 209, 88, 0.6);
}
.recebimento:active{transform:scale(0.98);}

.card-topo{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.icon{
  width:44px;height:44px;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.compra .icon{background:rgba(10, 132, 255, 0.2);}
.recebimento .icon{background:rgba(48, 209, 88, 0.2);}
.arrow{
  font-size:20px;
  color:rgba(235,235,245,0.3);
}

.label{
  color:rgba(235,235,245,0.6);
  font-size:13px;
  letter-spacing:0.4px;
  text-transform:uppercase;
  font-weight:600;
  margin-bottom:6px;
}
.valor{
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.5px;
}
.compra .valor{color:#0A84FF;}
.recebimento .valor{color:#30D158;}

.btn-voltar{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  background:rgba(118,118,128,0.24);
  backdrop-filter:saturate(180%) blur(20px);
  color:#fff;
  font-size:16px;
  font-weight:600;
  letter-spacing:-0.4px;
  cursor:pointer;
  transition: all 0.2s ease;
}
.btn-voltar:active{transform:scale(0.98);background:rgba(118,118,128,0.32)}

.rodape{text-align:center;padding:16px 0 0 0;color:rgba(235,235,245,0.3);font-size:11px;letter-spacing:-0.08px}
</style>
</head>
<body>
  <div class="container">
    
    <div class="header">
      <h1>Extrato</h1>
      <p>Toque para abrir o PDF</p>
    </div>

    <div class="card compra" onclick="abrirPDFCompra()">
      <div class="card-topo">
        <div class="icon">📄</div>
        <div class="arrow">→</div>
      </div>
      <div class="label">Data da Compra</div>
      <div class="valor" id="dataCompra">15/04/2026</div>
    </div>

    <div class="card recebimento" onclick="abrirPDFRecebimento()">
      <div class="card-topo">
        <div class="icon">📄</div>
        <div class="arrow">→</div>
      </div>
      <div class="label">Data do Recebimento</div>
      <div class="valor" id="dataRecebimento">20/05/2026</div>
    </div>

    <button class="btn-voltar" onclick="voltar()">Voltar ao Perfil</button>
    
    <div class="rodape">© 2026 Sistema Seguro</div>
  </div>

<script>
// Dados do extrato
const extrato = {
  dataCompra: '15/04/2026',
  dataRecebimento: '20/05/2026',
  pdfCompra: 'extrato-compra.pdf', // Troca pelo nome do seu PDF
  pdfRecebimento: 'extrato-recebimento.pdf' // Troca pelo nome do seu PDF
};

document.getElementById('dataCompra').innerText = extrato.dataCompra;
document.getElementById('dataRecebimento').innerText = extrato.dataRecebimento;

function abrirPDFCompra(){
  window.open(extrato.pdfCompra, '_blank');
}

function abrirPDFRecebimento(){
  window.open(extrato.pdfRecebimento, '_blank');
}

function voltar(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/menu.html';
}
</script>
</body>
</html>
