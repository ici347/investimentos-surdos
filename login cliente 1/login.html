<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{min-height:100vh;min-height:100dvh;background:url('login.jpeg') center/cover;display:flex;align-items:center;justify-content:center;padding:16px}
.login{background:rgba(0,0,0,0.75);padding:28px 20px;border-radius:16px;width:100%;max-width:360px;color:#fff;text-align:center}
h2{margin-bottom:24px;font-size:22px}
label{display:block;margin:12px 0 6px;font-size:14px;text-align:left}
input{width:100%;padding:14px;border:none;border-radius:10px;background:rgba(255,255,255,0.15);color:#fff;font-size:16px}
input::placeholder{color:#bbb}
.btn-entrar{width:100%;padding:14px;margin-top:24px;border:none;border-radius:10px;background:#7c3aed;color:#fff;font-size:16px;font-weight:600}
.btn-suporte{width:100%;padding:12px;margin-top:10px;border:1px solid rgba(255,255,255,0.3);border-radius:10px;background:transparent;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-suporte svg{width:18px;height:18px;fill:#25D366}
.descricao{margin-top:20px;font-size:12px;color:#999}
</style>
</head>
<body>
<form class="login">
  <h2>Entrar</h2>
  <label>Usuário</label>
  <input type="text" placeholder="Digite seu usuário" required>
  <label>Senha</label>
  <input type="password" placeholder="Digite sua senha" required>
  <button type="submit" class="btn-entrar">Acessar</button>
  <button type="button" class="btn-suporte">
    <svg viewBox="0 0 32 32">
      <path d="M16.001 2.667c-7.364 0-13.334 5.97-13.334 13.334 0 2.35.615 4.55 1.687 6.469L2.667 29.334l7.063-1.649c1.865 1.018 3.994 1.649 6.271 1.649 7.364 0 13.334-5.97 13.334-13.334S23.365 2.667 16.001 2.667zm0 24.001c-2.039 0-3.949-.548-5.598-1.498l-.401-.238-4.192.979.991-4.085-.261-.419c-1.035-1.663-1.58-3.588-1.58-5.588 0-6.075 4.942-11.017 11.017-11.017s11.017 4.942 11.017 11.017-4.942 11.017-11.017 11.017zm6.042-8.185c-.33-.165-1.952-.963-2.255-1.073-.303-.11-.523-.165-.743.165-.22.33-.852 1.073-1.045 1.293-.192.22-.385.248-.715.083-.33-.165-1.393-.513-2.653-1.636-0.981-.875-1.643-1.955-1.835-2.285-.192-.33-.021-.509.144-.674.148-.147.33-.385.495-.577.165-.192.22-.33.33-.55.11-.22.055-.413-.028-.577-.083-.165-.743-1.792-1.018-2.455-.268-.644-.541-.557-.743-.567-.192-.01-.413-.012-.634-.012-.22 0-.577.083-.88.413-.303.33-1.155 1.129-1.155 2.753 0 1.624 1.183 3.194 1.348 3.414.165.22 2.328 3.556 5.642 4.986.789.341 1.404.544 1.884.697.792.252 1.513.216 2.082.131.635-.095 1.952-.798 2.227-1.568.275-.77.275-1.43.192-1.568-.083-.138-.303-.22-.634-.385z"/>
    </svg>
    Suporte
  </button>
  <p class="descricao">© 2026 Sistema Seguro. Todos os direitos reservados.</p>
</form>
</body>
</html>
</body>
</html>
