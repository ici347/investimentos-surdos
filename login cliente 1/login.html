<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{min-height:100vh;min-height:100dvh;background:url('login.jpeg') center/cover;display:flex;align-items:center;justify-content:center;padding:16px}
.login{background:rgba(0,0,0,0.75);padding:28px 20px;border-radius:16px;width:100%;max-width:360px;color:#fff;text-align:center}
h2{margin-bottom:24px;font-size:22px}
label{display:block;margin:12px 0 6px;font-size:14px;text-align:left}
input{width:100%;padding:14px;border:none;border-radius:10px;background:rgba(255,255,255,0.15);color:#fff;font-size:16px}
input::placeholder{color:#bbb}
button{width:100%;padding:14px;margin-top:24px;border:none;border-radius:10px;background:#7c3aed;color:#fff;font-size:16px;font-weight:600}
.descricao{margin-top:20px;font-size:12px;color:#999}
</style>
</head>
<body>
<form class="login">
  <h2>Entrar</h2>
  <label>Usuário</label>
  <input type="text" placeholder="Digite seu usuário" required>
  <label>Senha</label>
  <input type="password" placeholder="Digite sua senha" required>
  <button type="submit">Acessar</button>
  <p class="descricao">© 2026 Sistema Seguro. Todos os direitos reservados.</p>
</form>
</body>
</html>
