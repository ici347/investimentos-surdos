<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perfil do Cliente</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden}
body{
  height:100dvh;
  background:url('menu2.jpeg') center/cover fixed;
  color:#f5f5f7;
  padding:12px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0, 0, 0, 0.7);
  z-index:-1;
}
.container{width:100%;max-width:380px;position:relative;z-index:1}

.card{
  background:rgba(28, 28, 30, 0.75);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-radius:16px;
  padding:14px;
  margin-bottom:9px;
  border:0.5px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
}

.topo{display:grid;grid-template-columns:64px 1fr;gap:16px;align-items:start;margin-bottom:6px}
.lado-foto{display:flex;flex-direction:column;align-items:center;gap:10px}
.foto{
  width:64px;height:64px;border-radius:50%;
  background:#1c1e;object-fit:cover;
  border:2px solid #0A84FF
}

.btn-config{
  height:34px;
  padding:0 14px;
  border-radius:17px;
  background:rgba(28, 28, 30, 0.75);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border:0.5px solid rgba(255,255,255,0.15);
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-size:13px;
  font-weight:600;
  color:#f5f5f7;
  letter-spacing:-0.3px;
}
.btn-config:hover{
  background:rgba(10, 132, 255, 0.25);
  border-color:rgba(10, 132, 255, 0.5);
  transform:scale(1.05);
  color:#0A84FF;
}
.btn-config:active{transform:scale(0.95);}

.info{display:grid;gap:0px}
.linha{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:3px;
  padding:8px 0;
  border-bottom:0.5px solid rgba(84,84,88,0.6)
}
.linha:last-child{border-bottom:none;flex-direction:row;align-items:center;justify-content:space-between;padding-bottom:0}
.label{color:rgba(235,235,245,0.6);font-size:11px;letter-spacing:0.4px;text-transform:uppercase;font-weight:600}
.valor{font-weight:600;font-size:15px;color:#f5f5f7;letter-spacing:-0.4px;line-height:1.2;word-break:break-word}

.saldo{
  background:rgba(10, 132, 255, 0.2);
  border:0.5px solid rgba(10, 132, 255, 0.5);
}
.saldo .linha{flex-direction:row;align-items:center;justify-content:space-between;border:none;padding:6px 0}
.saldo .label{color:rgba(255,255,255,0.8);font-size:14px;text-transform:none}
.saldo .valor{font-size:24px;font-weight:700;letter-spacing:-0.6px}

.ganhos{
  border:0.5px solid rgba(48, 209, 88, 0.4);
  background:rgba(28, 28, 30, 0.65);
}
.ganhos .linha{flex-direction:row;align-items:center;justify-content:space-between;border:none;padding:6px 0}
.ganhos .label{text-transform:none;font-size:14px}
.ganhos .valor{color:#30D158;font-size:18px;font-weight:600}

.saque{
  border:0.5px solid rgba(100, 210, 255, 0.4);
  background:rgba(28, 28, 30, 0.65);
}
.saque .linha{flex-direction:row;align-items:center;justify-content:space-between;border:none;padding:6px 0}
.saque .label{text-transform:none;font-size:14px}
.saque .valor{color:#64D2FF;font-size:16px;font-weight:600}

.extrato{
  border:0.5px solid rgba(255, 159, 10, 0.4);
  background:rgba(28, 28, 30, 0.65);
  cursor:pointer;
  transition: all 0.2s ease;
}
.extrato:hover{
  background:rgba(255, 159, 10, 0.15);
  transform:scale(1.02);
}
.extrato:active{transform:scale(0.98);}
.extrato .linha{flex-direction:row;align-items:center;justify-content:space-between;border:none;padding:6px 0}
.extrato .label{text-transform:none;font-size:14px}
.extrato .valor{color:#FF9F0A;font-size:14px;font-weight:600}

.termo{
  border:0.5px solid rgba(191, 90, 242, 0.4);
  background:rgba(28, 28, 30, 0.65);
  cursor:pointer;
  transition: all 0.2s ease;
}
.termo:hover{
  background:rgba(191, 90, 242, 0.15);
  transform:scale(1.02);
}
.termo:active{transform:scale(0.98);}
.termo .linha{flex-direction:row;align-items:center;justify-content:space-between;border:none;padding:6px 0}
.termo .label{text-transform:none;font-size:14px}
.termo .valor{color:#BF5AF2;font-size:14px;font-weight:600}

.btn-voltar{
  width:100%;
  padding:13px;
  margin-top:5px;
  border:none;
  border-radius:12px;
  background:rgba(118,118,128,0.24);
  backdrop-filter:saturate(180%) blur(20px);
  color:#fff;
  font-size:15px;
  font-weight:600;
  letter-spacing:-0.4px;
  cursor:pointer;
  transition: all 0.2s ease;
}
.btn-voltar:active{transform:scale(0.98);background:rgba(118,118,128,0.32)}

.rodape{text-align:center;padding:10px 0 0 0;color:rgba(235,235,245,0.3);font-size:10px;letter-spacing:-0.08px}
</style>
</head>
<body>
  <div class="container">
    
    <div class="card">
      <div class="topo">
        <div class="lado-foto">
          <img src="https://via.placeholder.com/64" alt="Foto do Cliente" class="foto">
          <button class="btn-config" onclick="abrirConfig()">Menu</button>
        </div>
        
        <div class="info">
          <div class="linha">
            <span class="label">Nome Completo</span>
            <span class="valor" id="nomeCompleto">******</span>
          </div>
          <div class="linha">
            <span class="label">Nº Cadastro</span>
            <span class="valor" id="cadastro">******</span>
          </div>
          <div class="linha">
            <span class="label">Renovação</span>
            <span class="valor" id="renovacao">**/**/****</span>
          </div>
          <div class="linha">
            <span class="label">Status</span>
            <span class="valor" style="color:red;font-size:13px">Inativo</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card saldo">
      <div class="linha">
        <span class="label">Saldo Atual</span>
        <span class="valor" id="saldo">R$ 0,00</span>
      </div>
    </div>

    <div class="card ganhos">
      <div class="linha">
        <span class="label">Ganhos Futuros</span>
        <span class="valor" id="ganhos">R$ 0,00</span>
      </div>
    </div>

    <div class="card saque">
      <div class="linha">
        <span class="label">Data do Saque</span>
        <span class="valor" id="dataSaque">**/**/****</span>
      </div>
    </div>

    <div class="card extrato" onclick="abrirExtrato()">
      <div class="linha">
        <span class="label">Extrato de Pagamento</span>
        <span class="valor">Ver detalhes →</span>
      </div>
    </div>

    <div class="card termo" onclick="abrirTermo()">
      <div class="linha">
        <span class="label">Termo de Acordo</span>
        <span class="valor">Ver documento →</span>
      </div>
    </div>

    <button class="btn-voltar" onclick="sairMenu()">Sair</button>
    
    <div class="rodape">© 2026 Sistema Seguro</div>
  </div>

<script>
const cliente = {
  nomeCompleto: '******',
  cadastro: '******',
  foto: 'perfil inativo.jpeg',
  saldo: 'R$ 0,00',
  ganhos: 'R$ 0,00',
  renovacao: '**/**/****',
  dataSaque: '**/**/****'
};

document.getElementById('nomeCompleto').innerText = cliente.nomeCompleto;
document.getElementById('cadastro').innerText = cliente.cadastro;
document.getElementById('saldo').innerText = cliente.saldo;
document.getElementById('ganhos').innerText = cliente.ganhos;
document.getElementById('renovacao').innerText = cliente.renovacao;
document.getElementById('dataSaque').innerText = cliente.dataSaque;
document.querySelector('.foto').src = cliente.foto;

function abrirConfig(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/ferramenta 1.html';
}

function abrirExtrato(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/extrato.html';
}

function abrirTermo(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/termo.html';
}

function sairMenu(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/login.html';
}
</script>
</body>
</html>
