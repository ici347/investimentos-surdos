
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perfil do Cliente</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased}
body{
  min-height:100vh;
  min-height:100dvh;
  background:url('menu.jpeg') center/cover fixed;
  color:#f5f5f7;
  padding:16px;
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0, 0, 0, 0.65);
  z-index:-1;
}
.container{width:100%;max-width:400px;margin:0 auto;position:relative;z-index:1}

.card{
  background:rgba(28, 28, 30, 0.72);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-radius:18px;
  padding:22px;
  margin-bottom:14px;
  border:0.5px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}

.topo{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:center;margin-bottom:20px}
.lado-foto{display:flex;flex-direction:column;align-items:center;gap:12px}
.foto{
  width:68px;height:68px;border-radius:50%;
  background:#1c1c1e;object-fit:cover;
  border:2px solid #0A84FF
}

.btn-config{
  width:38px;height:38px;border-radius:50%;
  background:rgba(118,118,128,0.24);
  border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:#f5f5f7;
  cursor:pointer;
  transition: all 0.2s ease;
}
.btn-config:active{transform:scale(0.96);background:rgba(118,118,128,0.32)}

.info{display:grid;gap:0}
.linha{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:0.5px solid rgba(84,84,88,0.6)}
.linha:last-child{border-bottom:none}
.label{color:rgba(235,235,245,0.6);font-size:15px;letter-spacing:-0.24px}
.valor{font-weight:600;font-size:15px;text-align:right;color:#f5f5f7;letter-spacing:-0.24px}

.saldo{
  background:rgba(10, 132, 255, 0.18);
  border:0.5px solid rgba(10, 132, 255, 0.4);
}
.saldo .label{color:rgba(255,255,255,0.8)}
.saldo .valor{font-size:28px;font-weight:700;letter-spacing:-0.5px}

.ganhos{
  border:0.5px solid rgba(48, 209, 88, 0.4);
  background:rgba(28, 28, 30, 0.6);
}
.ganhos .valor{color:#30D158;font-size:20px;font-weight:600}

.saque{
  border:0.5px solid rgba(100, 210, 255, 0.4);
  background:rgba(28, 28, 30, 0.6);
}
.saque .valor{color:#64D2FF;font-size:17px;font-weight:600}

.btn-voltar{
  width:100%;
  padding:15px;
  margin-top:16px;
  border:none;
  border-radius:12px;
  background:rgba(118,118,128,0.24);
  backdrop-filter:saturate(180%) blur(20px);
  color:#fff; /* AGORA BRANCO */
  font-size:17px;
  font-weight:600;
  letter-spacing:-0.24px;
  cursor:pointer;
  transition: all 0.2s ease;
}
.btn-voltar:active{transform:scale(0.98);background:rgba(118,118,128,0.32)}

.rodape{text-align:center;padding:22px 0 8px 0;color:rgba(235,235,245,0.3);font-size:12px;letter-spacing:-0.08px}
</style>
</head>
<body>
  <div class="container">
    
    <div class="card">
      <div class="topo">
        <div class="lado-foto">
          <img src="https://via.placeholder.com/64" alt="Foto do Cliente" class="foto">
          <button class="btn-config" onclick="abrirConfig()">⚙️</button>
        </div>
        
        <div class="info">
          <div class="linha">
            <span class="label">Nome Completo</span>
            <span class="valor" id="nomeCompleto">Jessica Fernanda</span>
          </div>
          <div class="linha">
            <span class="label">Nº Cadastro</span>
            <span class="valor" id="cadastro">20260048291</span>
          </div>
          <div class="linha">
            <span class="label">Renovação do Valor</span>
            <span class="valor" id="renovacao">27/05/2026</span>
          </div>
          <div class="linha">
            <span class="label">Status</span>
            <span class="valor" style="color:#30D158">Ativo</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card saldo">
      <div class="linha">
        <span class="label">Saldo Atual</span>
        <span class="valor" id="saldo">R$ 27.430,00</span>
      </div>
    </div>

    <div class="card ganhos">
      <div class="linha">
        <span class="label">Ganhos Futuros</span>
        <span class="valor" id="ganhos">R$ 2.116,00</span>
      </div>
    </div>

    <div class="card saque">
      <div class="linha">
        <span class="label">Data do Saque</span>
        <span class="valor" id="dataSaque">20/05/2026</span>
      </div>
    </div>

    <button class="btn-voltar" onclick="sairMenu()">Sair</button>
  </div>

  <div class="rodape">© 2026 Sistema Seguro</div>

<script>
const cliente = {
  nomeCompleto: 'Jessica Fernanda',
  cadastro: '20260048291',
  foto: 'cliente.jpeg',
  saldo: 'R$ 27.430,00',
  ganhos: 'R$ 2.116,00',
  renovacao: '27/05/2026',
  dataSaque: '20/05/2026'
};

document.getElementById('nomeCompleto').innerText = cliente.nomeCompleto;
document.getElementById('cadastro').innerText = cliente.cadastro;
document.getElementById('saldo').innerText = cliente.saldo;
document.getElementById('ganhos').innerText = cliente.ganhos;
document.getElementById('renovacao').innerText = cliente.renovacao;
document.getElementById('dataSaque').innerText = cliente.dataSaque;
document.querySelector('.foto').src = cliente.foto;

function abrirConfig(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/ferramenta 1.html';
}

function sairMenu(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/login.html';
}
</script>
</body>
</html>
