<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perfil do Cliente</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden} /* TRAVA O ROLO */
body{
  height:100dvh;
  background:url('menu2.jpeg') center/cover fixed;
  color:#f5f5f7;
  padding:16px;
  position:relative;
  display:flex;
  align-items:center; /* CENTRALIZA VERTICAL */
  justify-content:center; /* CENTRALIZA HORIZONTAL */
}
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0, 0, 0, 0.7);
  z-index:-1;
}
.container{width:100%;max-width:400px;position:relative;z-index:1}

.card{
  background:rgba(28, 28, 30, 0.75);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-radius:20px;
  padding:24px;
  margin-bottom:14px;
  border:0.5px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
}

.topo{display:grid;grid-template-columns:74px 1fr;gap:20px;align-items:start;margin-bottom:8px}
.lado-foto{display:flex;flex-direction:column;align-items:center;gap:14px}
.foto{
  width:74px;height:74px;border-radius:50%;
  background:#1c1e;object-fit:cover;
  border:2.5px solid #0A84FF
}

.btn-config{
  width:40px;height:40px;border-radius:50%;
  background:rgba(118,118,128,0.24);
  border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#f5f5f7;
  cursor:pointer;
  transition: all 0.2s ease;
}
.btn-config:active{transform:scale(0.94);background:rgba(118,118,128,0.32)}

.info{display:grid;gap:2px}
.linha{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:5px;
  padding:13px 0;
  border-bottom:0.5px solid rgba(84,84,88,0.6)
}
.linha:last-child{border-bottom:none;flex-direction:row;align-items:center;justify-content:space-between}
.label{color:rgba(235,235,245,0.6);font-size:12px;letter-spacing:0.4px;text-transform:uppercase;font-weight:600}
.valor{font-weight:600;font-size:17px;color:#f5f5f7;letter-spacing:-0.4px;line-height:1.25;word-break:break-word}

.saldo{
  background:rgba(10, 132, 255, 0.2);
  border:0.5px solid rgba(10, 132, 255, 0.5);
}
.saldo .linha{flex-direction:row;align-items:center;justify-content:space-between;border:none;padding:8px 0}
.saldo .label{color:rgba(255,255,255,0.8);font-size:15px;text-transform:none}
.saldo .valor{font-size:30px;font-weight:700;letter-spacing:-0.6px}

.ganhos{
  border:0.5px solid rgba(48, 209, 88, 0.4);
  background:rgba(28, 28, 30, 0.65);
}
.ganhos .linha{flex-direction:row;align-items:center;justify-content:space-between;border:none;padding:8px 0}
.ganhos .label{text-transform:none;font-size:15px}
.ganhos .valor{color:#30D158;font-size:21px;font-weight:600}

.saque{
  border:0.5px solid rgba(100, 210, 255, 0.4);
  background:rgba(28, 28, 30, 0.65);
}
.saque .linha{flex-direction:row;align-items:center;justify-content:space-between;border:none;padding:8px 0}
.saque .label{text-transform:none;font-size:15px}
.saque .valor{color:#64D2FF;font-size:18px;font-weight:600}

.btn-voltar{
  width:100%;
  padding:16px;
  margin-top:8px;
  border:none;
  border-radius:14px;
  background:rgba(118,118,128,0.24);
  backdrop-filter:saturate(180%) blur(20px);
  color:#fff;
  font-size:17px;
  font-weight:600;
  letter-spacing:-0.4px;
  cursor:pointer;
  transition: all 0.2s ease;
}
.btn-voltar:active{transform:scale(0.98);background:rgba(118,118,128,0.32)}

.rodape{text-align:center;padding:18px 0 0 0;color:rgba(235,235,245,0.3);font-size:12px;letter-spacing:-0.08px}
</style>
</head>
<body>
  <div class="container">
    
    <div class="card">
      <div class="topo">
        <div class="lado-foto">
          <img src="https://via.placeholder.com/74" alt="Foto do Cliente" class="foto">
          <button class="btn-config" onclick="abrirConfig()">⚙️</button>
        </div>
        
        <div class="info">
          <div class="linha">
            <span class="label">Nome Completo</span>
            <span class="valor" id="nomeCompleto">Jessica Fernanda</span>
          </div>
          <div class="linha">
            <span class="label">Nº Cadastro</span>
            <span class="valor" id="cadastro">20260048291</span>
          </div>
          <div class="linha">
            <span class="label">Renovação do Valor</span>
            <span class="valor" id="renovacao">27/05/2026</span>
          </div>
          <div class="linha">
            <span class="label">Status</span>
            <span class="valor" style="color:#30D158;font-size:15px">Ativo</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card saldo">
      <div class="linha">
        <span class="label">Saldo Atual</span>
        <span class="valor" id="saldo">R$ 27.430,00</span>
      </div>
    </div>

    <div class="card ganhos">
      <div class="linha">
        <span class="label">Ganhos Futuros</span>
        <span class="valor" id="ganhos">R$ 2.116,00</span>
      </div>
    </div>

    <div class="card saque">
      <div class="linha">
        <span class="label">Data do Saque</span>
        <span class="valor" id="dataSaque">20/05/2026</span>
      </div>
    </div>

    <button class="btn-voltar" onclick="sairMenu()">Sair</button>
    
    <div class="rodape">© 2026 Sistema Seguro</div>
  </div>

<script>
const cliente = {
  nomeCompleto: 'Jessica Fernanda',
  cadastro: '20260048291',
  foto: 'cliente.jpeg',
  saldo: 'R$ 27.430,00',
  ganhos: 'R$ 2.116,00',
  renovacao: '27/05/2026',
  dataSaque: '20/05/2026'
};

document.getElementById('nomeCompleto').innerText = cliente.nomeCompleto;
document.getElementById('cadastro').innerText = cliente.cadastro;
document.getElementById('saldo').innerText = cliente.saldo;
document.getElementById('ganhos').innerText = cliente.ganhos;
document.getElementById('renovacao').innerText = cliente.renovacao;
document.getElementById('dataSaque').innerText = cliente.dataSaque;
document.querySelector('.foto').src = cliente.foto;

function abrirConfig(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/ferramenta 1.html';
}

function sairMenu(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/login.html';
}
</script>
</body>
</html>
