<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perfil do Cliente</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{
  min-height:100vh;
  min-height:100dvh;
  background:url('ferramenta 1.jpeg') center/cover fixed;
  color:#fff;
  padding:16px;
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}
.container{width:100%;max-width:420px;margin:0 auto;position:relative;z-index:1}
.card{background:rgba(26,26,26,0.85);backdrop-filter:blur(8px);border-radius:16px;padding:20px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.1)}

.topo{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center;margin-bottom:18px}
.lado-foto{display:flex;flex-direction:column;align-items:center;gap:12px}
.foto{width:64px;height:64px;border-radius:50%;background:#333;object-fit:cover;border:2px solid #7c3aed}

.btn-config{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#fff
}

.info{display:grid;gap:0}
.linha{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
.linha:last-child{border-bottom:none}
.label{color:#bbb;font-size:13px}
.valor{font-weight:600;font-size:13px;text-align:right}

.saldo{background:linear-gradient(135deg,rgba(124,58,237,0.9),rgba(91,33,182,0.9));border:none}
.saldo .label, .saldo .valor{color:#fff}
.saldo .valor{font-size:22px}

.ganhos{border:1px solid #7c3aed;background:rgba(26,26,26,0.85)}
.ganhos .valor{color:#7c3aed;font-size:19px}

.saque{border:1px solid #22c55e;background:rgba(26,26,26,0.85)}
.saque .valor{color:#22c55e;font-size:16px}

.btn-voltar{width:100%;padding:14px;margin-top:16px;border:1px solid rgba(255,255,255,0.2);border-radius:10px;background:rgba(255,255,255,0.05);color:#fff;font-size:15px;font-weight:600}

.rodape{text-align:center;padding:20px 0 8px 0;color:rgba(255,255,255,0.4);font-size:11px;line-height:1.4}
</style>
</head>
<body>
  <div class="container">
    
    <div class="card">
      <div class="topo">
        <div class="lado-foto">
          <img src="https://via.placeholder.com/64" alt="Foto do Cliente" class="foto">
          <button class="btn-config" onclick="abrirConfig()">⚙️</button>
        </div>
        
        <div class="info">
          <div class="linha">
            <span class="label">Nome Completo</span>
            <span class="valor" id="nomeCompleto">Jessica Fernanda</span>
          </div>
          <div class="linha">
            <span class="label">Nº Cadastro</span>
            <span class="valor" id="cadastro">20260048291</span>
          </div>
          <div class="linha">
            <span class="label">Renovação do Valor</span>
            <span class="valor" id="renovacao">27/05/2026</span>
          </div>
          <div class="linha">
            <span class="label">Status</span>
            <span class="valor" style="color:green">Ativo</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card saldo">
      <div class="linha">
        <span class="label">Saldo Atual</span>
        <span class="valor" id="saldo">R$ 27.430,00</span>
      </div>
    </div>

    <div class="card ganhos">
      <div class="linha">
        <span class="label">Ganhos Futuros</span>
        <span class="valor" id="ganhos">R$ 2.116,00</span>
      </div>
    </div>

    <div class="card saque">
      <div class="linha">
        <span class="label">Data do Saque</span>
        <span class="valor" id="dataSaque">20/05/2026</span>
      </div>
    </div>

    <button class="btn-voltar" onclick="sairMenu()">Sair</button>
  </div>

  <div class="rodape">@ 2026 Sistema Seguro. Todos os direitos reservados.</div>

<script>
const cliente = {
  nomeCompleto: 'Jessica Fernanda',
  cadastro: '20260048291',
  foto: 'cliente.jpeg',
  saldo: 'R$ 27.430,00',
  ganhos: 'R$ 2.116,00',
  renovacao: '27/05/2026',
  dataSaque: '20/05/2026'
};

document.getElementById('nomeCompleto').innerText = cliente.nomeCompleto;
document.getElementById('cadastro').innerText = cliente.cadastro;
document.getElementById('saldo').innerText = cliente.saldo;
document.getElementById('ganhos').innerText = cliente.ganhos;
document.getElementById('renovacao').innerText = cliente.renovacao;
document.getElementById('dataSaque').innerText = cliente.dataSaque;
document.querySelector('.foto').src = cliente.foto;

function abrirConfig(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/ferramenta 1.html';
}

function sairMenu(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/login.html'; // troca aqui pro link do outro menu
}
</script>
</body>
</html>
