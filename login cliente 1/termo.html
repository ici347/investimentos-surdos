<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Termo de Acordo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden}
body{
  height:100dvh;
  background:url('menu2.jpeg') center/cover fixed;
  color:#f5f5f7;
  padding:16px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0, 0, 0, 0.7);
  z-index:-1;
}
.container{width:100%;max-width:380px;position:relative;z-index:1}

.header{
  text-align:center;
  margin-bottom:24px;
}
.header h1{
  font-size:28px;
  font-weight:700;
  letter-spacing:-0.6px;
  margin-bottom:4px;
}
.header p{
  font-size:14px;
  color:rgba(235,235,245,0.6);
  letter-spacing:-0.2px;
}

.card{
  background:rgba(28, 28, 30, 0.75);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-radius:16px;
  padding:24px;
  margin-bottom:14px;
  border:0.5px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
}

.info-termo{
  border:0.5px solid rgba(191, 90, 242, 0.4);
  background:rgba(28, 28, 30, 0.65);
}
.info-termo .icon{
  width:52px;height:52px;
  background:rgba(191, 90, 242, 0.2);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px auto;
  font-size:26px;
}
.info-termo .titulo{
  text-align:center;
  font-size:18px;
  font-weight:600;
  letter-spacing:-0.4px;
  margin-bottom:8px;
  color:#f5f5f7;
}
.info-termo .desc{
  text-align:center;
  font-size:14px;
  color:rgba(235,235,245,0.6);
  letter-spacing:-0.2px;
  line-height:1.4;
  margin-bottom:20px;
}

.linha-info{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:0.5px solid rgba(84,84,88,0.6);
}
.linha-info:last-child{border-bottom:none;}
.linha-info .label{
  color:rgba(235,235,245,0.6);
  font-size:13px;
  letter-spacing:0.4px;
  text-transform:uppercase;
  font-weight:600;
}
.linha-info .valor{
  font-size:15px;
  font-weight:600;
  color:#BF5AF2;
  letter-spacing:-0.3px;
}

.btn-pdf{
  width:100%;
  padding:16px;
  margin-bottom:10px;
  border:none;
  border-radius:14px;
  background:rgba(191, 90, 242, 0.25);
  backdrop-filter:saturate(180%) blur(20px);
  border:0.5px solid rgba(191, 90, 242, 0.5);
  color:#BF5AF2;
  font-size:16px;
  font-weight:600;
  letter-spacing:-0.4px;
  cursor:pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.btn-pdf:hover{
  background:rgba(191, 90, 242, 0.35);
  transform:scale(1.02);
}
.btn-pdf:active{transform:scale(0.98);}

.btn-voltar{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:rgba(118,118,128,0.24);
  backdrop-filter:saturate(180%) blur(20px);
  color:#fff;
  font-size:16px;
  font-weight:600;
  letter-spacing:-0.4px;
  cursor:pointer;
  transition: all 0.2s ease;
}
.btn-voltar:active{transform:scale(0.98);background:rgba(118,118,128,0.32)}

.rodape{text-align:center;padding:16px 0 0 0;color:rgba(235,235,245,0.3);font-size:11px;letter-spacing:-0.08px}
</style>
</head>
<body>
  <div class="container">
    
    <div class="header">
      <h1>Termo de Acordo</h1>
      <p>Contrato de Investimento</p>
    </div>

    <div class="card info-termo">
      <div class="icon">📑</div>
      <div class="titulo">Contrato Assinado</div>
      <div class="desc">Documento oficial com todas as cláusulas e condições do seu investimento</div>
      
      <div class="linha-info">
        <span class="label">Nº Contrato</span>
        <span class="valor" id="numContrato">#2026-48291</span>
      </div>
      <div class="linha-info">
        <span class="label">Data Assinatura</span>
        <span class="valor" id="dataAssinatura">15/04/2026</span>
      </div>
      <div class="linha-info">
        <span class="label">Vigência</span>
        <span class="valor" id="vigencia">12 meses</span>
      </div>
      <div class="linha-info">
        <span class="label">Status</span>
        <span class="valor" style="color:#30D158;">Ativo</span>
      </div>
    </div>

    <button class="btn-pdf" onclick="abrirPDF()">
      <span>📄</span>
      <span>Abrir PDF do Termo</span>
    </button>

    <button class="btn-voltar" onclick="voltar()">Voltar ao Perfil</button>
    
    <div class="rodape">© 2026 Sistema Seguro</div>
  </div>

<script>
// Dados do termo
const termo = {
  numContrato: '#2026-48291',
  dataAssinatura: '15/04/2026',
  vigencia: '12 meses',
  arquivoPDF: 'termo-acordo.html'
};

document.getElementById('numContrato').innerText = termo.numContrato;
document.getElementById('dataAssinatura').innerText = termo.dataAssinatura;
document.getElementById('vigencia').innerText = termo.vigencia;

function abrirPDF(){
  window.open(termo.arquivoPDF, '_blank');
}

function voltar(){
  window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/menu.html';
}
</script>
</body>
</html>
