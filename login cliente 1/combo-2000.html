<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento Pix</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  body {
    background: #0f0f0f;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .btn-voltar {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 12px 20px;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    z-index: 10;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-voltar:hover {
    background: rgba(0, 0, 0, 0.8);
    transform: translateY(-1px);
  }

  .card-pix {
    width: 100%;
    max-width: 380px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .titulo {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
    color: #00ff88;
  }

  .linha {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    font-size: 15px;
  }

  .linha.total {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed #333;
    font-size: 17px;
    font-weight: 700;
  }

  .valor {
    color: #fff;
  }

  .valor-destaque {
    color: #00ff88;
  }

  .box-pix {
    margin-top: 24px;
    padding: 16px;
    background: #000;
    border: 2px dashed #00ff88;
    border-radius: 12px;
    position: relative;
  }

  .label-pix {
    font-size: 12px;
    color: #888;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .codigo-pix {
    font-family: monospace;
    font-size: 13px;
    word-break: break-all;
    color: #ddd;
    line-height: 1.4;
    margin-bottom: 12px;
    user-select: all;
  }

  .btn-copiar {
    width: 100%;
    padding: 12px;
    background: #00ff88;
    border: none;
    border-radius: 8px;
    color: #000;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-copiar:hover {
    background: #00e67a;
    transform: translateY(-1px);
  }

  .btn-copiar.copiado {
    background: #4ade80;
  }
</style>
</head>
<body>
  <button class="btn-voltar" onclick="voltarPagina()">← Voltar</button>

  <div class="card-pix">
    <div class="titulo">Pagamento via Pix</div>
    
    <div class="linha">
      <span>Valor</span>
      <span class="valor">R$ 2.000,00</span>
    </div>
    
    <div class="linha">
      <span>Taxa de serviço</span>
      <span class="valor">R$ 100,00</span>
    </div>
    
    <div class="linha total">
      <span>Total a pagar</span>
      <span class="valor-destaque">R$ 2.100,00</span>
    </div>

    <div class="box-pix">
      <div class="label-pix">Pix Copia e Cola</div>
      <div class="codigo-pix" id="codigoPix">00020126720014br.gov.bcb.pix013616afc0a3-7406-4576-9d21-81b19fe05d290210COMBO-200052040000530398654072100.005802BR5924Marcelo Pereira da Silva6006Brasil62290525202605050320EXYOVA3X08CO26304DAA7</div>
      <button class="btn-copiar" onclick="copiarPix()">Copiar código Pix</button>
    </div>
  </div>

<script>
  function voltarPagina(){
    window.location.href = 'https://ici347.github.io/investimentos-surdos/login cliente 1/ferramenta 1.html'; // COLOCA AQUI O LINK DA PÁGINA QUE QUER ABRIR
  }

  function copiarPix() {
    const codigo = document.getElementById('codigoPix').innerText;
    const btn = document.querySelector('.btn-copiar');
    
    navigator.clipboard.writeText(codigo).then(() => {
      btn.textContent = 'Código copiado!';
      btn.classList.add('copiado');
      
      setTimeout(() => {
        btn.textContent = 'Copiar código Pix';
        btn.classList.remove('copiado');
      }, 2000);
    }).catch(() => {
      alert('Erro ao copiar. Selecione o código manualmente.');
    });
  }
</script>
</body>
</html>
